services:
  - type: web
    name: flashmind
    runtime: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DISABLE_VECTOR_STORE
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
